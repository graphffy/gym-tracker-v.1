services:
  - type: web
    name: gym-tracker
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeployTrigger: off
    envVars:
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: gym-tracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gym-tracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: gym-tracker-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gym-tracker-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gym-tracker-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false
      - key: JAVA_TOOL_OPTIONS
        value: -XX:MaxRAMPercentage=75

databases:
  - name: gym-tracker-db
    plan: free
    databaseName: gym_db
    postgresMajorVersion: "17"
